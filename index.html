<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hi… 😅</title>

<style>
body {
  text-align: center;
  font-family: Arial, sans-serif;
  background-color: #ffe6f0;
  margin-top: 50px;
}

h1 { font-size: 35px; }
h2 { font-weight: normal; }

button {
  font-size: 20px;
  padding: 12px 25px;
  margin: 10px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

#yes {
  background-color: #ff4d6d;
  color: white;
}

#no {
  background-color: #ccc;
  position: absolute;
}
</style>
</head>

<body>

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="200">

<h2>Hi… 😅</h2>
<h1>Happy Birthday ❤️</h1>

<h2>Hindi ako marunong sa ganito…</h2>
<h2>pero nag effort ako 😭</h2>

<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" width="200">

<h2>Thank you sa lahat… lalo na kay Yuna 🥺</h2>
<h2>ang galing mo maging mama</h2>

<h1>Will you go out on a date with me?</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="200">

<br>

<button id="yes" onclick="yesClicked()">YES 😳❤️</button>
<button id="no" onmouseover="moveNo()">No 😅</button>

<script>
let size = 20;

function moveNo() {
  const noBtn = document.getElementById("no");

  let x = Math.random() * window.innerWidth * 0.6;
  let y = Math.random() * window.innerHeight * 0.6;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  const yesBtn = document.getElementById("yes");
  size += 10;
  yesBtn.style.fontSize = size + "px";
}

function yesClicked() {
  window.location.href = "yes.html";
}
</script>

</body>
</html>
